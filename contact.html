            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</header>

<!-- ================= CONTACT SECTION ================= -->
<section class="contact-section reveal">
    <h1>Contact & Location</h1>

    <div class="contact-grid">

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <h2>Get in Touch</h2>

            <p><strong>📍 Address:</strong><br>
                Main Highway Road, Near Bus Stand,<br>
                Delhi – NCR
            </p>

            <p><strong>📞 WhatsApp:</strong><br>
                <a href="https://wa.me/919958792286" target="_blank">
                    +91 99587 92286
                </a>
            </p>

            <p><strong>📧 Email:</strong><br>
                <a href="mailto:animesansaryt@gmail.com">
                    animesansaryt@gmail.com
                </a>
            </p>

            <a href="https://wa.me/919958792286" target="_blank" class="btn whatsapp-btn ripple">
                Chat on WhatsApp
            </a>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-form">
            <h2>Send a Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="4"></textarea>
                <button type="submit" class="btn primary-btn ripple">
                    Send Message
                </button>
            </form>
        </div>

    </div>
</section>

<!-- ================= MAP ================= -->
<section class="map-section reveal">
    <iframe 
        src="https://www.google.com/maps?q=Delhi%20India&output=embed"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">

</section>
